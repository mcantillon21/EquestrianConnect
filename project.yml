  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"

targets:
  EquestrianConnect:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - EquestrianConnect
